<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel de Comando</title>
  <style>
    body {
      background-color: #111;
      color: #eee;
      font-family: monospace;
      padding: 20px;
    }
    #output, #notes {
      border: 1px solid #444;
      padding: 10px;
      margin-top: 20px;
      min-height: 100px;
      background-color: #222;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      background-color: #222;
      border: 1px solid #444;
      color: #eee;
      margin-top: 10px;
    }
    button {
      padding: 10px;
      margin-top: 10px;
      background-color: #444;
      color: #eee;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #666;
    }
    h1 {
      color: #ff4444;
    }
    .highlight {
      color: #ffcc00;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Painel de Comando</h1>
  <p>Digite um comando para descobrir um evento do mundo.</p>
  <p><strong>Comandos disponíveis:</strong> ordem_morta, fim_kian, morte_joui, equipe_verissimo, desconjuracao</p>
  
  <input id="commandInput" type="text" placeholder="Digite seu comando aqui...">
  <div id="output"></div>

  <h2>📓 Anotações Coletivas</h2>
  <input id="autor" type="text" placeholder="Seu nome">
  <textarea id="noteInput" placeholder="Escreva sua anotação aqui..."></textarea>
  <button id="saveNote">Salvar anotação</button>
  <p id="noteCount">Total de anotações: 0</p>
  
  <input id="searchInput" type="text" placeholder="Buscar anotação...">
  <div id="notes"></div>

  <div class="panel">
    <h2>Navegação</h2>
    <button onclick="window.location.href='armazenamento.html'">Ir para Armazenamento da Base</button>
  </div>

  <script>
    const API = "Backend.js"; // coloque aqui o endereço do backend

    const eventos = {
      ordem_morta: "Toda a Ordem foi destruída. Nenhum agente restou para proteger o mundo.",
      fim_kian: "Kian venceu a luta contra os agentes, mas morreu devido aos ferimentos, impedindo a calamidade.",
      morte_joui: "Joui foi espancado até a morte por Kian, diante dos olhos da equipe Veríssimo.",
      equipe_verissimo: "A equipe Veríssimo testemunhou a queda de Joui e lutou bravamente contra Kian.",
      desconjuracao: "Na desconjuração, Kian triunfou, mas sua morte selou o destino e impediu a calamidade."
    };

    const input = document.getElementById("commandInput");
    const output = document.getElementById("output");
    const noteInput = document.getElementById("noteInput");
    const saveNote = document.getElementById("saveNote");
    const notes = document.getElementById("notes");
    const searchInput = document.getElementById("searchInput");
    const autorInput = document.getElementById("autor");

    // carregar notas do SQL
    async function carregarNotas(filtro = "") {
      const res = await fetch(API + "/painel");
      const armazenadas = await res.json();
      notes.innerHTML = "";
      armazenadas.forEach((item, index) => {
        if (filtro && !item.mensagem.toLowerCase().includes(filtro.toLowerCase())) return;
        const p = document.createElement("p");
        let textoFormatado = item.mensagem;
        ["alerta", "importante", "missao"].forEach(palavra => {
          const regex = new RegExp(palavra, "gi");
          textoFormatado = textoFormatado.replace(regex, `<span class="highlight">${palavra}</span>`);
        });
        p.innerHTML = `🖊️ [${new Date(item.data).toLocaleString("pt-BR")}] <strong>${item.autor}</strong>: ${textoFormatado}`;
        notes.appendChild(p);
      });
      document.getElementById("noteCount").textContent = "Total de anotações: " + armazenadas.length;
    }

    carregarNotas();

    input.addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        const comando = input.value.trim().toLowerCase();
        if (comando === "sair") {
          output.innerHTML = "Encerrando o painel. Até a próxima investigação...";
        } else if (eventos[comando]) {
          output.innerHTML = eventos[comando];
        } else {
          output.innerHTML = "Comando desconhecido. Tente novamente.";
        }
        input.value = "";
      }
    });

    saveNote.addEventListener("click", async function() {
      const autor = autorInput.value.trim();
      const texto = noteInput.value.trim();
      if (autor && texto) {
        await fetch(API + "/painel", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ autor, mensagem: texto })
        });
        carregarNotas();
        noteInput.value = "";
      } else {
        alert("Preencha seu nome e a anotação!");
      }
    });

    searchInput.addEventListener("input", function() {
      carregarNotas(searchInput.value);
    });
  </script>
</body>
</html>
